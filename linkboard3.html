<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linkboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'> 📑 </text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --border: #e5e4e0;
    --border-hover: #c9c8c4;
    --text: #1a1a18;
    --text-muted: #888783;
    --accent: #1a1a18;
    --accent-fg: #f7f7f5;
    --radius: 14px;
    --radius-sm: 8px;
  }
  [data-theme="creamy"] {
    --bg: #f2ede3; --surface: #faf7f2; --border: #e0d9cc; --border-hover: #c8bfb0;
    --text: #2c2520; --text-muted: #9b8f82; --accent: #c96b2f; --accent-fg: #faf7f2;
  }
  [data-theme="dark"] {
    --bg: #141413; --surface: #1e1e1c; --border: #2e2e2b; --border-hover: #444441;
    --text: #f0efeb; --text-muted: #666461; --accent: #f0efeb; --accent-fg: #141413;
  }
  [data-theme="midnight"] {
    --bg: #0d0f1a; --surface: #151722; --border: #252836; --border-hover: #383c52;
    --text: #e8eaf6; --text-muted: #5c6080; --accent: #7c83f5; --accent-fg: #0d0f1a;
  }
  [data-theme="forest"] {
    --bg: #f0f4f0; --surface: #f8faf8; --border: #d4e0d4; --border-hover: #b0c8b0;
    --text: #1a271a; --text-muted: #7a9a7a; --accent: #2d6e2d; --accent-fg: #f8faf8;
  }
  [data-theme="rose"] {
    --bg: #fdf2f4; --surface: #fff8f9; --border: #f0d8dc; --border-hover: #deb8bf;
    --text: #2a1418; --text-muted: #b08088; --accent: #c0394a; --accent-fg: #fff8f9;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 2rem 1.5rem;
    transition: background 0.2s, color 0.2s;
  }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 860px; margin: 0 auto 1.75rem; gap: 10px;
  }
  h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
  .topbar-right { display: flex; align-items: center; gap: 8px; }

  .add-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: border-color 0.15s, background 0.15s; white-space: nowrap;
  }
  .add-btn:hover { border-color: var(--border-hover); background: var(--bg); }
  .add-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2.5; fill: none; }

  .theme-wrap { position: relative; }
  .theme-btn {
    width: 32px; height: 32px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: border-color 0.15s, color 0.15s;
  }
  .theme-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .theme-btn svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 2; fill: none; }

  .theme-popover {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 8px; display: flex; flex-direction: column; gap: 2px;
    z-index: 200; min-width: 155px; box-shadow: 0 6px 24px rgba(0,0,0,0.09);
  }
  .theme-popover.hidden { display: none; }
  .theme-option {
    display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px;
    cursor: pointer; border: none; background: transparent; color: var(--text);
    font-size: 13px; font-family: inherit; text-align: left; width: 100%; transition: background 0.12s;
  }
  .theme-option:hover { background: var(--bg); }
  .theme-option.active { font-weight: 500; }
  .theme-check { margin-left: auto; font-size: 11px; color: var(--accent); opacity: 0; }
  .theme-option.active .theme-check { opacity: 1; }
  .swatch { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid rgba(0,0,0,0.12); flex-shrink: 0; }

  /* grid & cards */
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px; max-width: 860px; margin: 0 auto;
  }

  .card {
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1.1rem 0.75rem 0.9rem;
    display: flex; flex-direction: column; align-items: center; gap: 9px;
    cursor: pointer; position: relative;
    transition: border-color 0.15s, transform 0.1s;
    user-select: none;
    background: var(--surface);
  }
  .card:hover { border-color: var(--border-hover); }
  .card:active { transform: scale(0.97); }
  .card.dragging { opacity: 0.35; transform: scale(0.95); }
  .card.drag-over { border-color: var(--accent); border-style: dashed; }

  .card-icon {
    width: 52px; height: 52px; border-radius: 12px;
    background: rgba(0,0,0,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; overflow: hidden; flex-shrink: 0;
  }
  .card-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }

  .card-label {
    font-size: 12px; font-weight: 500; text-align: center;
    word-break: break-word; line-height: 1.3; max-width: 100%;
  }

  /* three-dot menu */
  .card-menu-wrap { position: absolute; top: 6px; right: 6px; display: none; }
  .card:hover .card-menu-wrap { display: block; }

  .dots-btn {
    width: 22px; height: 22px; border: 1px solid var(--border);
    background: var(--surface); border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-muted);
    transition: color 0.15s, border-color 0.15s;
  }
  .dots-btn:hover { color: var(--text); border-color: var(--border-hover); }
  .dots-btn svg { width: 12px; height: 12px; fill: currentColor; }

  .card-dropdown {
    position: absolute; top: calc(100% + 4px); right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 5px;
    min-width: 130px; z-index: 50;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .card-dropdown.hidden { display: none; }

  .dd-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 9px; border-radius: 6px; border: none;
    background: transparent; color: var(--text); font-size: 12px;
    font-family: inherit; cursor: pointer; width: 100%; text-align: left;
    transition: background 0.1s;
  }
  .dd-item:hover { background: var(--bg); }
  .dd-item.danger { color: #c0394a; }
  .dd-item svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2.2; fill: none; flex-shrink: 0; }
  .dd-sep { height: 1px; background: var(--border); margin: 4px 0; }

  .empty {
    text-align: center; padding: 4rem 1rem;
    color: var(--text-muted); font-size: 14px; max-width: 860px; margin: 0 auto;
  }

  /* modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.5rem; width: 360px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .modal-title { font-size: 15px; font-weight: 600; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .field input[type="text"], .field input[type="url"] {
    padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--border-hover); }

  .color-row { display: flex; align-items: center; gap: 12px; }
  .color-field { display: flex; flex-direction: column; gap: 5px; flex: 1; }
  .color-field label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
  .color-input-wrap { display: flex; align-items: center; gap: 8px; }
  .color-swatch {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    cursor: pointer; padding: 0; background: none; overflow: hidden; flex-shrink: 0;
  }
  .color-swatch input[type="color"] {
    width: 200%; height: 200%; margin: -50%; border: none; cursor: pointer; padding: 0;
  }
  .color-reset {
    font-size: 11px; color: var(--text-muted); background: none; border: none;
    cursor: pointer; padding: 3px 6px; border-radius: 4px; font-family: inherit;
  }
  .color-reset:hover { color: var(--text); background: var(--bg); }

  .icon-row { display: flex; align-items: center; gap: 10px; }
  .icon-preview {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--bg); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; overflow: hidden; flex-shrink: 0;
  }
  .icon-preview img { width: 100%; height: 100%; object-fit: cover; }

  .upload-btn {
    flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text-muted); font-size: 12px; font-family: inherit;
    cursor: pointer; text-align: center; transition: border-color 0.15s, color 0.15s;
  }
  .upload-btn:hover { border-color: var(--border-hover); color: var(--text); }

  .emoji-grid { display: flex; flex-wrap: wrap; gap: 4px; max-height: 96px; overflow-y: auto; }
  .emoji-btn {
    width: 30px; height: 30px; border: 1px solid transparent; border-radius: 6px;
    background: var(--bg); cursor: pointer; font-size: 17px;
    display: flex; align-items: center; justify-content: center; transition: border-color 0.1s;
  }
  .emoji-btn:hover, .emoji-btn.sel { border-color: var(--border-hover); }
  .emoji-btn.sel { background: var(--surface); }

  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-cancel {
    padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: transparent; color: var(--text-muted); font-size: 13px; font-family: inherit; cursor: pointer;
  }
  .btn-save {
    padding: 7px 16px; border: 1px solid transparent; border-radius: var(--radius-sm);
    background: var(--accent); color: var(--accent-fg); font-size: 13px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }

  .io-btn {
    width: 32px; height: 32px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, color 0.15s; flex-shrink: 0;
  }
  .io-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .io-btn svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 2; fill: none; }

  .confirm-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 300;
    backdrop-filter: blur(2px);
  }
  .confirm-bg.hidden { display: none; }
  .confirm-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.4rem 1.5rem;
    width: 300px; display: flex; flex-direction: column; gap: 14px;
  }
  .confirm-title { font-size: 14px; font-weight: 600; }
  .confirm-msg { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
</style>
</head>
<body>

<div class="topbar">
  <h1>Links</h1>
  <div class="topbar-right">
    <div class="theme-wrap">
      <button class="theme-btn" title="Change theme" onclick="toggleThemePopover()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <div class="theme-popover hidden" id="theme-popover"></div>
    </div>
    <button class="io-btn" title="Export JSON" onclick="exportJSON()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    </button>
    <button class="io-btn" title="Import JSON" onclick="document.getElementById('import-input').click()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    </button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importJSON(event)">
    <button class="add-btn" onclick="openModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add link
    </button>
  </div>
</div>

<div class="grid" id="grid"></div>
<div class="empty" id="empty">No links yet — click "Add link" to get started.</div>

<input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleImage(event)">

<div class="modal-bg" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-title" id="modal-title">Add link</div>
    <div class="field">
      <label>Name</label>
      <input type="text" id="f-name" placeholder="e.g. GitHub" />
    </div>
    <div class="field">
      <label>URL</label>
      <input type="url" id="f-url" placeholder="https://..." />
    </div>
    <div class="color-row">
      <div class="color-field">
        <label>Card background</label>
        <div class="color-input-wrap">
          <div class="color-swatch" id="swatch-bg"><input type="color" id="f-bgcolor" value="#ffffff"></div>
          <button class="color-reset" onclick="resetColor('bg')">Reset</button>
        </div>
      </div>
      <div class="color-field">
        <label>Font color</label>
        <div class="color-input-wrap">
          <div class="color-swatch" id="swatch-fg"><input type="color" id="f-fgcolor" value="#1a1a18"></div>
          <button class="color-reset" onclick="resetColor('fg')">Reset</button>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Icon</label>
      <div class="icon-row">
        <div class="icon-preview" id="icon-preview">🔗</div>
        <div style="display:flex;flex-direction:column;gap:6px;flex:1">
          <input type="text" id="f-custom-emoji" placeholder="Type emoji or text…" maxlength="6" style="text-align:center;font-size:18px;letter-spacing:2px" />
          <div class="upload-btn" onclick="document.getElementById('file-input').click()">Upload image</div>
        </div>
      </div>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="requestCloseModal(false)">Cancel</button>
      <button class="btn-save" onclick="saveCard()">Save</button>
    </div>
  </div>
</div>

<!-- confirm: unsaved changes -->
<div class="confirm-bg hidden" id="confirm-discard">
  <div class="confirm-box">
    <div class="confirm-title">Discard changes?</div>
    <div class="confirm-msg">You have unsaved changes. Discard them?</div>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="hideConfirm('confirm-discard')">Keep editing</button>
      <button class="btn-save" style="background:#c0394a" onclick="forceCloseModal()">Discard</button>
    </div>
  </div>
</div>

<!-- confirm: load default -->
<div class="confirm-bg hidden" id="confirm-default">
  <div class="confirm-box">
    <div class="confirm-title">Load default links?</div>
    <div class="confirm-msg">No saved links found. Load <code>defaultlinkboard.json</code> from this folder?</div>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="hideConfirm('confirm-default')">Start blank</button>
      <button class="btn-save" onclick="loadDefault()">Load default</button>
    </div>
  </div>
</div>

<script>
const EMOJIS = ['🔗','🌐','📁','📌','🎯','🚀','💡','🎨','🛠️','📊','📝','🔍','💼','🎮','🎵','📷','🏠','⭐','❤️','🔒','📱','💻','🌍','🧠','🔥','🎬','📚','🏋️','🍕','✈️'];
const THEMES = [
  { id: 'light',    label: 'Light',    bg: '#ffffff',  dot: '#e5e4e0' },
  { id: 'creamy',   label: 'Creamy',   bg: '#faf7f2',  dot: '#e0d9cc' },
  { id: 'dark',     label: 'Dark',     bg: '#1e1e1c',  dot: '#2e2e2b' },
  { id: 'midnight', label: 'Midnight', bg: '#151722',  dot: '#252836' },
  { id: 'forest',   label: 'Forest',   bg: '#f8faf8',  dot: '#d4e0d4' },
  { id: 'rose',     label: 'Rose',     bg: '#fff8f9',  dot: '#f0d8dc' },
];

const SVG = {
  edit:  `<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  trash: `<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
  copy:  `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
  dots:  `<svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>`,
};

let cards = [], editId = null, iconData = null, selEmoji = '🔗';
let currentTheme = 'creamy';
let customBg = null, customFg = null;
let modalDirty = false;
let backdropMousedownOnBg = false;

function applyTheme(id) {
  currentTheme = id;
  if (id === 'light') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', id);
  try { localStorage.setItem('linkboard-theme', id); } catch(e) {}
  buildThemePopover();
}

function toggleThemePopover() {
  document.getElementById('theme-popover').classList.toggle('hidden');
}

function buildThemePopover() {
  const p = document.getElementById('theme-popover');
  p.innerHTML = THEMES.map(t => `
    <button class="theme-option${t.id === currentTheme ? ' active' : ''}" data-tid="${t.id}">
      <span class="swatch" style="background:${t.bg};border-color:${t.dot}"></span>
      ${t.label}<span class="theme-check">✓</span>
    </button>`).join('');
  p.querySelectorAll('.theme-option').forEach(btn => {
    btn.addEventListener('click', () => { applyTheme(btn.dataset.tid); p.classList.add('hidden'); });
  });
}

document.addEventListener('click', e => {
  if (!e.target.closest('.theme-wrap')) document.getElementById('theme-popover').classList.add('hidden');
  if (!e.target.closest('.card-menu-wrap')) closeAllDropdowns();
});

function closeAllDropdowns() {
  document.querySelectorAll('.card-dropdown').forEach(d => d.classList.add('hidden'));
}

function load() {
  try {
    const d = localStorage.getItem('linkboard'); if (d) cards = JSON.parse(d);
    const t = localStorage.getItem('linkboard-theme'); if (t) currentTheme = t;
  } catch(e) {}

  applyTheme(currentTheme);

  if (!cards.length) {
    document.getElementById('confirm-default').classList.remove('hidden');
  }

  render();
}

function loadDefault() {
  hideConfirm('confirm-default');
  fetch('defaultlinkboard.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => {
      if (Array.isArray(data.cards)) cards = data.cards;
      else if (Array.isArray(data)) cards = data;
      if (data.theme) applyTheme(data.theme);
      persist(); render();
    })
    .catch(() => render());
}

function persist() {
  try { localStorage.setItem('linkboard', JSON.stringify(cards)); } catch(e) {}
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cardStyle(c) {
  const parts = [];
  if (c.bgcolor) parts.push(`background:${c.bgcolor}`);
  if (c.fgcolor) parts.push(`color:${c.fgcolor}`);
  return parts.length ? `style="${parts.join(';')}"` : '';
}

function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!cards.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  grid.innerHTML = cards.map((c, i) => `
    <div class="card" draggable="true" data-i="${i}" ${cardStyle(c)}>
      <div class="card-menu-wrap">
        <button class="dots-btn" data-di="${i}" title="Options">${SVG.dots}</button>
        <div class="card-dropdown hidden" id="dd-${i}">
          <button class="dd-item" data-edit="${i}">${SVG.edit} Edit</button>
          <button class="dd-item" data-dup="${i}">${SVG.copy} Duplicate</button>
          <div class="dd-sep"></div>
          <button class="dd-item danger" data-del="${i}">${SVG.trash} Delete</button>
        </div>
      </div>
      <div class="card-icon">${c.image ? `<img src="${esc(c.image)}" alt="">` : `<span>${c.emoji || '🔗'}</span>`}</div>
      <span class="card-label" ${c.fgcolor ? `style="color:${c.fgcolor}"` : ''}>${esc(c.name)}</span>
    </div>
  `).join('');

  grid.querySelectorAll('.card').forEach((el, i) => {
    el.addEventListener('click', e => {
      if (e.target.closest('.card-menu-wrap')) return;
      const url = cards[i].url;
      if (url) window.open(url.startsWith('http') ? url : 'https://' + url, '_blank');
    });
    el.addEventListener('dragstart', () => { dragSrc = i; el.classList.add('dragging'); });
    el.addEventListener('dragover', e => { e.preventDefault(); if (i !== dragSrc) el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault(); el.classList.remove('drag-over');
      if (dragSrc === null || dragSrc === i) return;
      const arr = [...cards]; const [m] = arr.splice(dragSrc, 1); arr.splice(i, 0, m);
      cards = arr; persist(); render();
    });
    el.addEventListener('dragend', () => {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('dragging','drag-over'));
      dragSrc = null;
    });
  });

  grid.querySelectorAll('[data-di]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const dd = document.getElementById(`dd-${btn.dataset.di}`);
      const wasHidden = dd.classList.contains('hidden');
      closeAllDropdowns();
      if (wasHidden) dd.classList.remove('hidden');
    });
  });
  grid.querySelectorAll('[data-edit]').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); closeAllDropdowns(); openModal(+btn.dataset.edit); });
  });
  grid.querySelectorAll('[data-dup]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation(); closeAllDropdowns();
      const copy = { ...cards[+btn.dataset.dup] };
      cards.splice(+btn.dataset.dup + 1, 0, copy);
      persist(); render();
    });
  });
  grid.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation(); closeAllDropdowns();
      cards.splice(+btn.dataset.del, 1); persist(); render();
    });
  });
}

let dragSrc = null;

function resetColor(which) {
  if (which === 'bg') { customBg = null; document.getElementById('f-bgcolor').value = '#ffffff'; }
  else { customFg = null; document.getElementById('f-fgcolor').value = '#1a1a18'; }
  modalDirty = true;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('f-bgcolor').addEventListener('input', e => { customBg = e.target.value; modalDirty = true; });
  document.getElementById('f-fgcolor').addEventListener('input', e => { customFg = e.target.value; modalDirty = true; });
  document.getElementById('f-name').addEventListener('input', () => modalDirty = true);
  document.getElementById('f-url').addEventListener('input', () => modalDirty = true);
  document.getElementById('f-custom-emoji').addEventListener('input', e => {
    const val = e.target.value.trim();
    if (!val) return;
    selEmoji = val; iconData = null;
    document.getElementById('icon-preview').innerHTML = val;
    modalDirty = true;
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('sel'));
  });

  const modalBg = document.getElementById('modal');

  /* track where mousedown started — only close if both mousedown AND mouseup land on the backdrop */
  modalBg.addEventListener('mousedown', e => {
    backdropMousedownOnBg = e.target === modalBg;
  });
  modalBg.addEventListener('mouseup', e => {
    if (backdropMousedownOnBg && e.target === modalBg) requestCloseModal(false);
    backdropMousedownOnBg = false;
  });
});

function requestCloseModal(skipDirtyCheck) {
  if (!skipDirtyCheck && modalDirty) {
    document.getElementById('confirm-discard').classList.remove('hidden');
    return;
  }
  forceCloseModal();
}

function forceCloseModal() {
  hideConfirm('confirm-discard');
  document.getElementById('modal').style.display = 'none';
  document.getElementById('file-input').value = '';
  modalDirty = false;
}

function hideConfirm(id) {
  document.getElementById(id).classList.add('hidden');
}

function buildEmojiGrid() {
  document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e =>
    `<button class="emoji-btn${e === selEmoji ? ' sel' : ''}" data-e="${e}">${e}</button>`).join('');
  document.getElementById('emoji-grid').querySelectorAll('.emoji-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selEmoji = btn.dataset.e; iconData = null;
      document.getElementById('icon-preview').innerHTML = selEmoji;
      document.getElementById('f-custom-emoji').value = '';
      modalDirty = true;
      buildEmojiGrid();
    });
  });
}

function handleImage(ev) {
  const f = ev.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = d => {
    iconData = d.target.result;
    document.getElementById('icon-preview').innerHTML = `<img src="${iconData}">`;
    modalDirty = true;
  };
  r.readAsDataURL(f);
}

function openModal(id = null) {
  editId = id; iconData = null; selEmoji = '🔗'; customBg = null; customFg = null; modalDirty = false;
  document.getElementById('modal-title').textContent = id !== null ? 'Edit link' : 'Add link';
  document.getElementById('f-custom-emoji').value = '';
  if (id !== null) {
    const c = cards[id];
    document.getElementById('f-name').value = c.name || '';
    document.getElementById('f-url').value = c.url || '';
    selEmoji = c.emoji || '🔗';
    iconData = c.image || null;
    customBg = c.bgcolor || null;
    customFg = c.fgcolor || null;
    document.getElementById('f-bgcolor').value = customBg || '#ffffff';
    document.getElementById('f-fgcolor').value = customFg || '#1a1a18';
    document.getElementById('icon-preview').innerHTML = iconData ? `<img src="${iconData}">` : selEmoji;
    if (!EMOJIS.includes(selEmoji) && !iconData) document.getElementById('f-custom-emoji').value = selEmoji;
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-url').value = '';
    document.getElementById('f-bgcolor').value = '#ffffff';
    document.getElementById('f-fgcolor').value = '#1a1a18';
    document.getElementById('icon-preview').innerHTML = '🔗';
  }
  buildEmojiGrid();
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function saveCard() {
  const name = document.getElementById('f-name').value.trim();
  const url  = document.getElementById('f-url').value.trim();
  if (!name) { document.getElementById('f-name').focus(); return; }
  const card = { name, url, emoji: selEmoji, image: iconData || null, bgcolor: customBg || null, fgcolor: customFg || null };
  if (editId !== null) cards[editId] = card; else cards.push(card);
  persist(); render();
  modalDirty = false;
  forceCloseModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') requestCloseModal(false); });

function exportJSON() {
  const data = { theme: currentTheme, cards };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'linkboard.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importJSON(ev) {
  const f = ev.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = d => {
    try {
      const data = JSON.parse(d.target.result);
      if (Array.isArray(data.cards)) cards = data.cards;
      else if (Array.isArray(data)) cards = data;
      if (data.theme) applyTheme(data.theme);
      persist(); render();
    } catch(e) { alert('Invalid JSON file.'); }
  };
  r.readAsText(f);
  ev.target.value = '';
}

load();
</script>
</body>
</html>
